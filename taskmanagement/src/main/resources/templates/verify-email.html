<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

	<div
		style="font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9;">
		<div
			style="max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);">
			<h2 style="color: #4CAF50; text-align: center;">Kích hoạt tài
				khoản</h2>
			<p>
				Xin chào <b th:text="${fullName}"></b>
			</p>
			<p>Cảm ơn bạn đã đăng ký! Vui lòng nhấn vào nút bên dưới để kích
				hoạt tài khoản của bạn:</p>
			<div style="text-align: center; margin: 20px 0;">
				<a th:href="${verifyUrl}"
					style="background-color: #4CAF50; color: white; padding: 12px 20px; text-decoration: none; border-radius: 5px; font-weight: bold;">
					Kích Hoạt Ngay
				</a>
			</div>
			<p>
				Liên kết sẽ hết hạn sau: <b th:text="${expiredAtStr}"></b>.
			</p>
			<hr style="border: none; border-top: 1px solid #ddd;">
			<p style="font-size: 12px; color: #777;">Nếu bạn không yêu cầu
				tạo tài khoản, vui lòng bỏ qua email này.</p>
		</div>
	</div>

</body>
</html>
