spring:
  datasource:
    url: jdbc:mysql://localhost:3306/task_management_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    # Connection Pool
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8081